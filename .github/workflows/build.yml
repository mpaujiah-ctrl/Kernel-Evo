name: Kernel Evo A15 (vic) - KSUN Next-SUSFS Official Setup

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (Evolution-X-Devices, branch vic / A15)
        run: git clone --depth=1 -b vic https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      # --- INSTALL KSUN + SUSFS PAKAI SETUP SCRIPT RESMI ---
      # Branch next-susfs sudah include integrasi SUSFS, jadi gak perlu
      # patch/curl file terpisah dari repo lain.
      - name: Install KernelSU-Next (legacy, untuk non-GKI) via official setup script
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          echo "=== Verify hasil setup ==="
          ls -la KernelSU-Next drivers/kernelsu 2>/dev/null
          grep -rn "kernelsu" drivers/Makefile drivers/Kconfig 2>/dev/null
      
      
      - name: Clone susfs4ksu (branch kernel-4.14) dan apply patch resmi ke kernel tree
        run: |
          git clone --depth=1 -b kernel-4.14 https://gitlab.com/simonpunk/susfs4ksu.git
          cp susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch kernel/
          cp susfs4ksu/kernel_patches/fs/* kernel/fs/
          cp susfs4ksu/kernel_patches/include/linux/* kernel/include/linux/
          cd kernel
          patch -p1 < 50_add_susfs_in_kernel-4.14.patch || true
          echo "=== Cek reject files ==="
          find . -name "*.rej"

      - name: Repair reject dari task_mmu.c
        run: |
          cd kernel
          if [ -f fs/proc/task_mmu.c.rej ]; then
            grep -q "susfs_def.h" fs/proc/task_mmu.c || \
            sed -i '/#include <linux\/mm_inline.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n#include <linux/susfs_def.h>\n#endif' fs/proc/task_mmu.c
            rm -f fs/proc/task_mmu.c.rej
          fi
      
      - name: Repair reject dari kernel/sys.c
        run: |
          cd kernel
          if [ -f kernel/sys.c.rej ]; then
            grep -q "susfs_spoof_uname" kernel/sys.c || \
            sed -i '/SYSCALL_DEFINE1(newuname/i #ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME\nextern void susfs_spoof_uname(struct new_utsname* tmp);\n#endif' kernel/sys.c
            sed -i '/memcpy(&tmp, utsname(), sizeof(tmp));/a #ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME\n\tsusfs_spoof_uname(&tmp);\n#endif' kernel/sys.c
            rm -f kernel/sys.c.rej
          fi

      - name: Fail build kalau masih ada reject tersisa
        run: |
          cd kernel
          LEFTOVER=$(find . -name "*.rej")
          if [ -n "$LEFTOVER" ]; then
            echo "Masih ada patch reject, harus dicek manual:"
            echo "$LEFTOVER"
            for f in $LEFTOVER; do cat "$f"; done
            exit 1
          fi
          echo "Semua patch bersih, lanjut build."
      
      - name: Enable CONFIG_KSU + SUSFS di defconfig
        run: |
          cd kernel
          DEFCONFIG=arch/arm64/configs/cepheus_defconfig
          for cfg in CONFIG_KSU CONFIG_KSU_SUSFS CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT \
                     CONFIG_KSU_SUSFS_SUS_PATH CONFIG_KSU_SUSFS_SUS_MOUNT \
                     CONFIG_KSU_SUSFS_SUS_KSTAT CONFIG_KSU_SUSFS_SUS_SU \
                     CONFIG_KSU_SUSFS_SPOOF_UNAME CONFIG_KSU_SUSFS_ENABLE_LOG; do
            grep -q "^${cfg}=y" $DEFCONFIG || echo "${cfg}=y" >> $DEFCONFIG
          done
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-EvolutionX_cepheus_v3.2.0_KSUN"/' $DEFCONFIG
      
      - name: Check kprobe config (dibutuhkan KSUN Next untuk hooking otomatis)
        run: |
          cd kernel
          grep -q "CONFIG_KPROBES=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KPROBES=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "CONFIG_HAVE_KPROBES=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/cepheus_defconfig
          grep "KPROBES" arch/arm64/configs/cepheus_defconfig

      - name: Fix yamltree.c (stub kosong)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          struct dt_info;
          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF

      - name: Diagnose kenapa ksud_integration.c gak ke-link
        run: |
          cd kernel
          echo "=== Cari referensi ksud_integration di Makefile/Kconfig ==="
          grep -rn "ksud_integration" --include=Makefile --include=Kconfig . 2>/dev/null || echo "TIDAK DITEMUKAN di Makefile manapun"
          echo "=== Isi folder runtime/ ==="
          ls -la KernelSU-Next/kernel/runtime/ 2>/dev/null
          echo "=== Makefile drivers/kernelsu (kalau ada) ==="
          find . -path "*/kernelsu/Makefile" -exec cat {} \;
          echo "=== Sisa .rej yang nyebut input/runtime ==="
          find KernelSU-Next -name "*.rej" | xargs -I{} sh -c 'echo "--- {} ---"; cat {}' 2>/dev/null || true
      
      - name: Wire folder runtime/ ke Makefile KernelSU-Next
        run: |
          cd kernel
          MAKEFILE=$(find KernelSU-Next -maxdepth 2 -name "Makefile" | grep -v runtime | head -1)
          echo "Pakai Makefile: $MAKEFILE"
          cat "$MAKEFILE"
          echo "=== Nambahin obj-y untuk runtime/ ==="
          grep -q "runtime/ksud_integration.o" "$MAKEFILE" || \
            echo 'obj-y += runtime/ksud_integration.o' >> "$MAKEFILE"
          grep -q "runtime/boot_event.o" "$MAKEFILE" || \
            echo 'obj-y += runtime/boot_event.o' >> "$MAKEFILE"
          echo "=== Hasil akhir ==="
          tail -20 "$MAKEFILE"
      
      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1
          make O=out ARCH=arm64 cepheus_defconfig
          make ARCH=arm64 O=out CC=clang AR=llvm-ar LD=ld.lld NM=llvm-nm \
               OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3 && zip -r9 ../EvoX_cepheus_vic_KSUN_SUSFS.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EvoX-cepheus-vic-KSUN-SUSFS
          path: |
            EvoX_cepheus_vic_KSUN_SUSFS.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
