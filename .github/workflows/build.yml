name: Kernel Evolution X A15 - Recon

on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (Evolution-X-Devices)
        run: |
          echo "=== Coba branch yang mungkin sesuai A15 (vic = VanillaIceCream) ==="
          git clone --depth=1 -b 15.0 https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel 2>&1 || \
          git clone --depth=1 -b vic https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel 2>&1 || \
          echo "GAGAL kedua branch, perlu cek manual branch yang tersedia"

      - name: Cek branch yang tersedia (kalau clone di atas gagal semua)
        run: |
          git ls-remote --heads https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus

      - name: Cek isi kernel (kalau clone berhasil)
        run: |
          cd kernel 2>/dev/null && ls -la || echo "Folder kernel kosong/gagal clone"
