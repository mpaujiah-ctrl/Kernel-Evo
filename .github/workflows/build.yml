name: Kernel Evolution X A15 - Recon

on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (Evolution-X-Devices)
        run: |
          echo "=== Coba branch yang mungkin sesuai A15 (vic = VanillaIceCream) ==="
          git clone --depth=1 -b 15.0 https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel 2>&1 || \
          git clone --depth=1 -b vic https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel 2>&1 || \
          echo "GAGAL kedua branch, perlu cek manual branch yang tersedia"

      - name: Cek branch yang tersedia (kalau clone di atas gagal semua)
        run: |
          git ls-remote --heads https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus

      - name: Cek isi kernel (kalau clone berhasil)
        run: |
          cd kernel 2>/dev/null && ls -la || echo "Folder kernel kosong/gagal clone"

      - name: Cek build.sh dan build.config (skema build apa yang dipakai)
        run: |
          cd kernel
          echo "=== isi build.sh ==="
          cat build.sh
          echo "=== isi build.config.common ==="
          cat build.config.common
          echo "=== isi build.config.aarch64 ==="
          cat build.config.aarch64

      - name: Cek folder KernelSU
        run: |
          cd kernel
          ls -la KernelSU/
          find KernelSU -iname "*.h" | xargs grep -l "KSU_VERSION" 2>/dev/null | head -3

      - name: Cek hook manual (pola sama seperti kemarin)
        run: |
          cd kernel
          grep -n "ksu_handle_execveat" fs/exec.c || echo "TIDAK ADA hook execveat"
          grep -n "ksu_handle_faccessat" fs/open.c || echo "TIDAK ADA hook faccessat"
          grep -n "ksu_handle_vfs_read" fs/read_write.c || echo "TIDAK ADA hook vfs_read"
